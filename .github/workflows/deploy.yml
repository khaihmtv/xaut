name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_PRIVATE_KEY }}" > ~/.ssh/xaut-key.pem
          chmod 600 ~/.ssh/xaut-key.pem
          ssh-keyscan -H 13.239.19.84 >> ~/.ssh/known_hosts

      - name: Deploy to AWS
        run: |
          ssh -i ~/.ssh/xaut-key.pem ec2-user@13.239.19.84 << 'EOF'
          cd ~/xaut || mkdir -p ~/xaut && cd ~/xaut
          git clone https://github.com/khaihmtv/XAUT.git . || git pull origin main
          docker build -t xaut-api:latest .
          docker stop xaut-api || true
          docker rm xaut-api || true
          docker run -d --name xaut-api --restart always -p 8000:8000 -e DATABASE_URL=postgresql://xaut_user:xaut_password@xaut-db:5432/xaut_db -e DEBUG=False xaut-api:latest
          echo "Deployment completed successfully!"
          EOF

      - name: Notify deployment
        if: success()
        run: echo "✅ Deployment to AWS successful! Application running at: https://13.239.19.84"